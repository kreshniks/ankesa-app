<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regjistri i Ekspertizave</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .header-content { text-align: center; flex: 1; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .logout-btn { padding: 10px 20px; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .logout-btn:hover { background: white; color: #667eea; }
        .tabs { display: flex; background: #f8f9fa; border-bottom: 2px solid #dee2e6; }
        .tab { flex: 1; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; font-weight: 600; color: #495057; border: none; background: none; font-size: 16px; }
        .tab.active { background: white; color: #667eea; border-bottom: 3px solid #667eea; }
        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; }
        
        /* GRID ME 3 KOLONA */
        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }
        
        label { font-weight: 600; margin-bottom: 8px; color: #495057; }
        input, textarea, select { padding: 12px; border: 2px solid #dee2e6; border-radius: 8px; font-size: 14px; }
        textarea { resize: vertical; min-height: 80px; }
        
        .conditional-field { display: none; }
        .conditional-field.show { display: flex; }
        
        .btn { padding: 12px 30px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-success { background: #28a745; color: white; }
        
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 10px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #dee2e6; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }

        @media (max-width: 1024px) { .form-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="width: 120px;"></div>
            <div class="header-content">
                <h1>📋 Regjistri i Ekspertizave</h1>
                <p>Sistem profesional për regjistrim dhe raportim të ekspertizave</p>
            </div>
            <button class="logout-btn" onclick="logout()">🚪 Dil</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('regjistrim', event)">➕ Regjistro Ekspertizë</button>
            <button class="tab" onclick="switchTab('lista', event)">📊 Lista e Ekspertizave</button>
        </div>

        <div id="regjistrim" class="tab-content active">
            <form id="ankeseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nr. i Protokollit *</label>
                        <input type="text" id="nrProtokollit" required>
                    </div>
                    <div class="form-group">
                        <label>Numri i Prokurimit</label>
                        <input type="text" id="nr_prokurimit">
                    </div>
                    <div class="form-group">
                        <label>Titulli i Aktivitetit *</label>
                        <input type="text" id="titulliAktivitetit" required>
                    </div>

                    <div class="form-group">
                        <label>Autoriteti Kontraktues *</label>
                        <input type="text" id="autoriteti" required>
                    </div>
                    <div class="form-group">
                        <label>OE Ankues *</label>
                        <input type="text" id="oeAnkues" required>
                    </div>
                    <div class="form-group">
                        <label>Data e Autorizimit</label>
                        <input type="date" id="dataAutorizimit">
                    </div>

                    <div class="form-group">
                        <label>Lloji i Angazhimit *</label>
                        <select id="llojiAngazhimit" required onchange="toggleEkspertiField()">
                            <option value="">-- Zgjidhni --</option>
                            <option value="Ekspert Shqyrtues">Ekspert Shqyrtues</option>
                            <option value="Ekspert Teknik">Ekspert Teknik</option>
                            <option value="Superekspertizë">Superekspertizë</option>
                        </select>
                    </div>
                    <div class="form-group conditional-field" id="ekspertiShqyrtuesField">
                        <label>Eksperti Shqyrtues *</label>
                        <input type="text" id="ekspertiShqyrtues">
                    </div>
                    <div class="form-group">
                        <label>Dorëzuar me datë *</label>
                        <input type="date" id="dataDorezimet" required>
                    </div>

                    <div class="form-group">
                        <label>Shuma Bruto (€) *</label>
                        <select id="shumaBruto" required>
                            <option value="">-- Zgjidhni --</option>
                            <option value="150.00">150,00 €</option>
                            <option value="120.00">120,00 €</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Shuma Neto (€) *</label>
                        <select id="shumaNeto" required>
                            <option value="">-- Zgjidhni --</option>
                            <option value="128.25">128,25 €</option>
                            <option value="102.60">102,60 €</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Statusi i Pagesës *</label>
                        <select id="statusiPageses" required>
                            <option value="">-- Zgjidhni --</option>
                            <option value="Paguar">Paguar</option>
                            <option value="Papaguar">Papaguar</option>
                            <option value="Pjesërisht">Pjesërisht</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Rekomandimi</label>
                        <textarea id="rekomandimi"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>Vendimi</label>
                        <textarea id="vendimi"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Bashkëngjit Raportin (URL)</label>
                        <input type="text" id="raportFileUrl" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Bashkëngjit Vendimin (URL)</label>
                        <input type="text" id="vendimFileUrl" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Nr. i Faturës</label>
                        <input type="text" id="nrFatures">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">💾 Ruaj Ekspertizën</button>
            </form>
        </div>

        <div id="lista" class="tab-content">
            <div class="export-buttons" style="margin-bottom: 20px;">
                <button class="btn btn-success" onclick="exportToExcel()">📥 Eksporto në Excel</button>
            </div>
            <div class="table-container">
                <table id="ankesetTable">
                    <thead>
                        <tr>
                            <th>Nr</th>
                            <th>Nr. Protokolli</th>
                            <th>Nr. Prokurimit</th>
                            <th>Titulli</th>
                            <th>Lloji</th>
                            <th>Eksperti</th>
                            <th>Data Aut.</th>
                            <th>Data Dor.</th>
                            <th>Shuma Neto</th>
                            <th>Statusi</th>
                        </tr>
                    </thead>
                    <tbody id="ankesetTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let ankeset = [];

        async function checkAuth() {
            const res = await fetch(`${API_BASE}/api/check-auth`);
            const data = await res.json();
            if (!data.authenticated) window.location.href = '/';
        }

        async function logout() {
            await fetch(`${API_BASE}/api/logout`, { method: 'POST' });
            window.location.href = '/';
        }

        function toggleEkspertiField() {
            const lloji = document.getElementById('llojiAngazhimit').value;
            const field = document.getElementById('ekspertiShqyrtuesField');
            if (lloji === 'Ekspert Teknik') field.classList.add('show');
            else field.classList.remove('show');
        }

        async function loadAnkesa() {
            const res = await fetch(`${API_BASE}/api/ankesa`);
            ankeset = await res.json();
            const tbody = document.getElementById('ankesetTableBody');
            tbody.innerHTML = '';
            ankeset.forEach((a, i) => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${a.nrProtokollit}</td>
                    <td>${a.nrProkurimit || '-'}</td>
                    <td>${a.titulliAktivitetit.substring(0, 30)}...</td>
                    <td>${a.llojiAngazhimit}</td>
                    <td>${a.ekspertiShqyrtues}</td>
                    <td>${a.dataAutorizimit || '-'}</td>
                    <td>${a.dataDorezimet}</td>
                    <td>${a.shumaNeto} €</td>
                    <td>${a.statusiPageses}</td>
                `;
            });
        }

        document.getElementById('ankeseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nrProtokollit: document.getElementById('nrProtokollit').value,
                nrProkurimit: document.getElementById('nr_prokurimit').value,
                titulliAktivitetit: document.getElementById('titulliAktivitetit').value,
                autoriteti: document.getElementById('autoriteti').value,
                oeAnkues: document.getElementById('oeAnkues').value,
                dataAutorizimit: formatDateForBackend(document.getElementById('dataAutorizimit').value),
                dataDorezimet: formatDateForBackend(document.getElementById('dataDorezimet').value),
                llojiAngazhimit: document.getElementById('llojiAngazhimit').value,
                ekspertiShqyrtues: document.getElementById('ekspertiShqyrtues').value,
                shumaBruto: document.getElementById('shumaBruto').value,
                shumaNeto: document.getElementById('shumaNeto').value,
                statusiPageses: document.getElementById('statusiPageses').value,
                rekomandimi: document.getElementById('rekomandimi').value,
                vendimi: document.getElementById('vendimi').value,
                nrFatures: document.getElementById('nrFatures').value,
                raportFileUrl: document.getElementById('raportFileUrl').value,
                vendimFileUrl: document.getElementById('vendimFileUrl').value
            };

            const res = await fetch(`${API_BASE}/api/ankesa`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert('Ekspertiza u ruajt saktë!');
                document.getElementById('ankeseForm').reset();
                loadAnkesa();
                switchTab('lista');
            }
        });

        function formatDateForBackend(val) {
            if (!val) return null;
            const d = new Date(val);
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }

        function switchTab(name, e) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (e) e.target.classList.add('active');
            document.getElementById(name).classList.add('active');
            if (name === 'lista') loadAnkesa();
        }

        function exportToExcel() { window.location.href = '/api/ankesa/export'; }

        window.onload = () => { checkAuth(); loadAnkesa(); };
    </script>
</body>
</html>
